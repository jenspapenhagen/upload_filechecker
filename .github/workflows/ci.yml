name: Maven CI/CD

on:
  push:
    branches: [ master ]


jobs:
  build_and_test:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21

      - name: Build project with Maven
        run: mvn -B package --file pom.xml